server {
    listen 80;

    # Serve static frontend files from the mounted volume
    root /usr/share/nginx/html;
    index index.html;

    # Evita servir HTML/estaticos antigos durante desenvolvimento.
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    # SPA fallback: try exact file, then directory, then serve index.html
    # This ensures Angular client-side routing works for all routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for API calls:
    # The frontend uses same-origin /api/... paths to avoid CORS issues.
    # Nginx strips the /api/ prefix and forwards to Payara, so:
    #   /api/CircPeticionario/webresources/<resource>/<endpoint>
    #   → http://circ.peticionario.payara:8080/CircPeticionario/webresources/<resource>/<endpoint>
    location /api/ {
        proxy_pass http://circ.peticionario.payara:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
