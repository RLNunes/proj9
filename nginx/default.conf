server {
    listen 80;

    # Serve static frontend files from the mounted volume
    root /usr/share/nginx/html;
    index index.html;

    # Static file requests: try exact file, then directory, then 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache de imagens e ícones por 7 dias
    location ~* \.(png|jpg|jpeg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Cache de ficheiros JS e CSS por 1 dia (mais curto para facilitar atualizações)
    location ~* \.(css|js)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Reverse proxy for API calls:
    # The frontend uses same-origin /api/... paths to avoid CORS issues.
    # Nginx strips the /api/ prefix and forwards to Payara, so:
    #   /api/CircPeticionario/webresources/<resource>/<endpoint>
    #   → http://circ.peticionario.payara:8080/CircPeticionario/webresources/<resource>/<endpoint>
    location /api/ {
        proxy_pass http://circ.peticionario.payara:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
