<nav class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex w-full max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8 xl:flex-row xl:items-center xl:justify-between">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-600">{{ title }}</p>
    </div>
    @if (links.length > 0) {
      <div class="flex flex-wrap gap-2">
        @for (link of links; track link.label) {
          <a
            [routerLink]="link.link"
            class="rounded-full border border-slate-200 px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-blue-300 hover:bg-blue-50 hover:text-blue-700">
            {{ link.label }}
          </a>
        }
      </div>
    }
  </div>
</nav>
