networks:
  # Rede gerida pelo Compose — não é necessário criar manualmente antes de arrancar
  network_circ_peticionario:
    driver: bridge

volumes:
  postgres_data: {}

services:

  # SGBD - PostgreSQL
  data_base:
    image: postgres:14
    container_name: circ_peticionario_cnt_db
    hostname: circ.peticionario.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DataBase/schema:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=proj_fapesp
    ports:
      - '5432:5432'   # SGBD
    networks:
      - network_circ_peticionario
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Payara
  payara:
    build:
      context: ./Payara
      dockerfile: Dockerfile
    image: circ_peticionario_image_payara
    container_name: circ_peticionario_cnt_payara
    hostname: circ.peticionario.payara
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
    ports:
      - '9082:8080'     # Web Server
      - '9848:4848'     # Payara Admin Web Console
    depends_on:
      data_base:
        condition: service_healthy
    networks:
      - network_circ_peticionario
    restart: unless-stopped

  # Nginx — serve ficheiros estáticos do Angular FrontEnd e faz reverse proxy da API para o Payara
  nginx:
    build:
      context: .
      dockerfile: Frontend-Angular/Dockerfile
    image: circ_peticionario_image_frontend
    container_name: circ_peticionario_cnt_nginx
    hostname: circ.peticionario.nginx
    ports:
      - '80:80'         # Frontend + API proxy
    depends_on:
      - payara
    networks:
      - network_circ_peticionario
    restart: unless-stopped
