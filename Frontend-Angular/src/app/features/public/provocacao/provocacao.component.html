<app-entity-page-layout class="flex flex-col items-center gap-6 px-20">
  <app-page-title
    class="text-6xl font-semibold"
    page-header
    title="Provocação">
  </app-page-title>
  <app-generic-filter-form
    class="flex flex-col w-full items-center gap-4"
    page-filters
    title="Filtro"
    [fields]="filterFields"
    (search)="onSearch($event)"
    (clear)="onClear()">
  </app-generic-filter-form>

  <p-button
    page-actions
    class="self-start"
    icon="pi pi-plus"
    [raised]="true"
    label="Criar Provocação">
  </p-button>

</app-entity-page-layout>
