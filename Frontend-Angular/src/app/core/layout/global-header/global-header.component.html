<p-toolbar styleClass="border-none rounded-none px-4 py-2 bg-white">
  <ng-template pTemplate="start">
    <div class="flex items-center gap-6">
      <a routerLink="/home" class="flex items-center gap-3 no-underline text-inherit">
        <img
          [src]="headerConfig().logo"
          [alt]="headerConfig().label"
          class="h-10 w-auto"
        />
      </a>

      @if (headerConfig().displayNav) {
        <nav class="flex items-center gap-4 text-sm">
          @for (navItem of headerConfig().navItems; track navItem.label) {
            <a [routerLink]="navItem.link" class="no-underline text-inherit">
              {{ navItem.label }}
            </a>
          }
        </nav>
      }
    </div>
  </ng-template>

  <ng-template pTemplate="end">
    <app-user-menu />
  </ng-template>
</p-toolbar>
