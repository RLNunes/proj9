@if (cards.length > 0) {
  <section class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    @for (card of cards; track card.label) {
      <a
        [routerLink]="card.link"
        class="group rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h3 class="text-lg font-semibold text-slate-900">{{ card.label }}</h3>
            <p class="mt-2 text-sm leading-6 text-slate-600">{{ card.description }}</p>
          </div>
        </div>
      </a>
    }
  </section>
}
