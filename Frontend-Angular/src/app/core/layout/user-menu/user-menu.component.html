<div class="flex items-center gap-1 mr-8">

  @if (!isAuthenticated()) {
    <button
      type="button"
      class="cursor-pointer border-none bg-transparent p-0 rounded-full"
      aria-label="Login"
      (click)="onAvatarClick()"
    >
      <p-avatar icon="pi pi-user" shape="circle" size="normal" />
    </button>
  } @else {
    <button
      type="button"
      class="cursor-pointer border-none bg-transparent p-0 flex items-center gap-1"
      aria-label="Abrir menu"
      (click)="op.toggle($event)"
    >
      <p-avatar icon="pi pi-user" shape="circle" size="normal" />
      <i class="pi pi-chevron-down text-xs text-gray-500"></i>
    </button>

    <p-popover #op [dismissable]="true" styleClass="p-0" appendTo="body">
      <div class="flex flex-col min-w-40">
        @for (domain of dropdownDomains(); track domain.link) {
          <button
            type="button"
            pRipple
            class="flex items-center px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-none bg-transparent cursor-pointer text-left w-full"
            (click)="navigateTo(domain.link); op.hide()"
          >
            {{ domain.label }}
          </button>
        }

        @if (dropdownDomains().length > 0) {
          <hr class="my-1 border-gray-200 mx-0" />
        }

        <button
          type="button"
          pRipple
          class="flex items-center px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-none bg-transparent cursor-pointer text-left w-full"
          (click)="logout(); op.hide()"
        >
          Sair
        </button>
      </div>
    </p-popover>
  }

</div>

<app-login-modal />
