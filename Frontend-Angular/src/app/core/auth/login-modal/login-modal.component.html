<p-dialog
  header="Login"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '28rem' }"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onHide)="close()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      <label for="username" class="text-sm font-medium">Utilizador</label>
      <input
        id="username"
        type="text"
        pInputText
        formControlName="username"
        autocomplete="username"
      />
      @if (form.controls.username.invalid && form.controls.username.touched) {
        <small class="text-red-600">O utilizador é obrigatório.</small>
      }
    </div>

    <div class="flex flex-col gap-2">
      <label for="password" class="text-sm font-medium">Senha</label>
      <p-password
        inputId="password"
        formControlName="password"
        [feedback]="false"
        [toggleMask]="true"
        [inputStyle]="{ width: '100%' }"
        autocomplete="current-password"
      />
      @if (form.controls.password.invalid && form.controls.password.touched) {
        <small class="text-red-600">A senha é obrigatória.</small>
      }
    </div>

    <div class="flex items-center gap-2">
      <p-checkbox
        inputId="rememberMe"
        formControlName="rememberMe"
        [binary]="true"
      />
      <label for="rememberMe" class="text-sm">Lembrar-me</label>
    </div>

    @if (errorMessage()) {
      <div class="text-sm text-red-600">
        {{ errorMessage() }}
      </div>
    }

    <div class="flex justify-end gap-2 pt-2">
      <button
        pButton
        type="button"
        label="Cancelar"
        severity="secondary"
        [text]="true"
        (click)="close()"
      ></button>

      <button
        pButton
        type="submit"
        label="Submeter"
        [loading]="loading()"
      ></button>
    </div>
  </form>
</p-dialog>
