<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="mb-4 flex items-center justify-between gap-4">
    <h3 class="text-lg font-semibold text-slate-900">{{ title }}</h3>
  </div>
  @if (fields.length === 0) {
    <p class="text-sm text-slate-500">Sem filtros configurados.</p>
  } @else {
    <div class="grid gap-4 md:grid-cols-2">
      @for (field of fields; track field.key) {
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-700">{{ field.label }}</label>
          <input
            type="text"
            class="w-full rounded-xl border border-slate-200 px-4 py-2 text-sm outline-none ring-0 transition focus:border-blue-400"
            [placeholder]="field.placeholder ?? field.label" />
        </div>
      }
    </div>
  }
</div>
