<div class="min-h-screen flex flex-col bg-gray-50">
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white rounded-2xl shadow-sm p-8">
      <h1 class="text-3xl font-bold text-blue-700 mb-4">Bem-vindo a Circuitos Oceânicos</h1>
      <p class="text-gray-600 mb-6">
        Esta é a nova interface Angular da aplicação.
        As chamadas à API são encaminhadas através de <code class="bg-gray-100 px-1 rounded">/api/...</code>
        pelo Nginx para o Payara.
      </p>

      <div class="flex gap-4 flex-wrap">
        <button
          (click)="pingApi()"
          class="px-5 py-2 bg-blue-700 text-white rounded-lg hover:bg-blue-800 transition-colors font-medium">
          Testar API
        </button>
      </div>

      @if (apiMessage) {
        <div class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-800">
          {{ apiMessage }}
        </div>
      }

      @if (apiError) {
        <div class="mt-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700">
          {{ apiError }}
        </div>
      }
    </div>
  </main>
</div>
<app-provocacao></app-provocacao>
